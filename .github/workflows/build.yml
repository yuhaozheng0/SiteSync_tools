name: Build Windows EXE

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller windows-curses

      - name: Build EXE
        run: pyinstaller --onefile --console SiteSync_tools_ui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SiteSync_tools-windows
          path: dist/SiteSync_tools_ui.exe
